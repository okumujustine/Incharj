<!DOCTYPE html>

    .box { text-align: center; }
    h2 { font-size: 1.2rem; font-weight: 500; margin: 0 0 8px; }

    <h2>Connecting to Incharj…</h2>

    window.location.href = "incharj://oauth/callback" + params;
  </script>
