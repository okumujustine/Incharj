name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: "macOS Apple Silicon"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: "macOS Intel"

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}
    environment: Incharj

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NOTION_CLIENT_ID: ${{ secrets.NOTION_CLIENT_ID }}
          NOTION_CLIENT_SECRET: ${{ secrets.NOTION_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Incharj ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See the full changelog in the repository.

            ## Install
            - **Apple Silicon (M1/M2/M3):** download `Incharj_*_aarch64.dmg`
            - **Intel Mac:** download `Incharj_*_x86_64.dmg`

            > First launch: right-click the app → Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
