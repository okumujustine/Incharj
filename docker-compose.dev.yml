version: "3.9"

x-backend-env: &backend-env
  PORT: ${PORT}
  ENVIRONMENT: ${ENVIRONMENT}
  API_PREFIX: ${API_PREFIX}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  APP_SECRET: ${APP_SECRET}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
  COOKIE_SECURE: ${COOKIE_SECURE}
  COOKIE_SAMESITE: ${COOKIE_SAMESITE}
  REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME}
  FRONTEND_URL: ${FRONTEND_URL}
  RESEND_API_KEY: ${RESEND_API_KEY}
  DOCUMENT_WORKER_CONCURRENCY: ${DOCUMENT_WORKER_CONCURRENCY}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
  SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
  SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
  SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
  SLACK_NOTIFY_CHANNEL: ${SLACK_NOTIFY_CHANNEL}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL}
  SEMANTIC_SEARCH_ENABLED: ${SEMANTIC_SEARCH_ENABLED}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE}
  EMBEDDING_REQUEST_MAX_ATTEMPTS: ${EMBEDDING_REQUEST_MAX_ATTEMPTS}
  EMBEDDING_RETRY_BASE_DELAY_MS: ${EMBEDDING_RETRY_BASE_DELAY_MS}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/app
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app worker --loglevel=info -Q sync_orchestration,sync_documents

  worker-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/app
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app beat --loglevel=info

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./docs:/app
      - docs_node_modules:/app/node_modules
    ports:
      - "4173:4173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173"

volumes:
  postgres_dev_data:
  redis_dev_data:
  web_node_modules:
  docs_node_modules:
