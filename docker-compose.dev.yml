version: "3.9"

x-infisical: &infisical
  SECRETS_PROVIDER: infisical
  INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
  INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
  INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-402f1c69-f66a-499a-afe4-72e8f330e234}
  INFISICAL_ENVIRONMENT: ${INFISICAL_ENVIRONMENT:-dev}
  INFISICAL_SECRET_PATH: /

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: incharj_dev
      POSTGRES_USER: incharj
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incharj -d incharj_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    environment:
      <<: *infisical
      DATABASE_URL: postgresql+asyncpg://incharj:devpassword@postgres:5432/incharj_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/app
    environment:
      <<: *infisical
      DATABASE_URL: postgresql+asyncpg://incharj:devpassword@postgres:5432/incharj_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app worker --loglevel=info -Q sync_orchestration,sync_documents

  worker-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/app
    environment:
      <<: *infisical
      DATABASE_URL: postgresql+asyncpg://incharj:devpassword@postgres:5432/incharj_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app beat --loglevel=info

  bot:
    build:
      context: ./apps/bot
      dockerfile: Dockerfile
    volumes:
      - ./apps/bot:/app
    environment:
      <<: *infisical
      INCHARJ_API_URL: http://api:8000
    depends_on:
      - api

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - ./scripts:/scripts
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      <<: *infisical
      VITE_API_URL: http://api:8000
    depends_on:
      - api
    command: >
      sh -c "npm install &&
             npm install --prefix /scripts --silent &&
             node /scripts/run-with-secrets.mjs -- npm run dev -- --host 0.0.0.0"

volumes:
  postgres_dev_data:
  redis_dev_data:
  web_node_modules:
