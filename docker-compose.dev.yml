version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: incharj_dev
      POSTGRES_USER: incharj
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incharj -d incharj_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://incharj:devpassword@postgres:5432/incharj_dev
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - worker_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://incharj:devpassword@postgres:5432/incharj_dev
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npm install && npm run worker"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_dev_data:
  redis_dev_data:
  api_node_modules:
  worker_node_modules:
  frontend_node_modules:
